# 事前レビュー ゴールド回帰：PoC検証マトリクス（難易度1〜4 × 2軸）
#
# 画像のPoC受け入れ基準に対応：
#   軸① ナレッジ検索精度（retrieval_cases）
#   軸② LLMが生成するレビュー品質（review_cases）
# 文言一致でなく「性質」で判定するため、プロンプト微修正に強い。
#
# 運用：正解（NuROお手本）未確定の間は provisional: true（WARN止まり）。
#   確定後に should_flag_any→must_flag へ、provisional: false にするとハードゲート（FAILでexit=1）。
#   ケース追加・期待値変更は本YAML編集のみ（scripts/eval_review.py は不変）。

version: "0.2-matrix-provisional"

# ───────────────────────────────────────────────────────────────
# 軸① ナレッジ検索精度
#   tool : f3_all（他社/全社） / f3_own（自社） / f2
#   query: 検索クエリ（費目・パラフレーズ）
#   reactor_type / utility: 任意の絞り込み
#   expect:
#     min_hits      : 最低ヒット件数
#     fee_any       : ヒットのいずれかが含むべき費目（部分一致）
#     all_reactor   : 全ヒットが該当炉型であること（炉型フィルタ検証）
# ───────────────────────────────────────────────────────────────
retrieval_cases:
  - name: 難1_費目完全一致でF3上位ヒット
    difficulty: 1
    provisional: true
    tool: f3_all
    query: "解体撤去費"
    expect:
      min_hits: 5
      fee_any: ["解体撤去費"]

  - name: 難2_表記ゆれ/パラフレーズでもヒット
    difficulty: 2
    provisional: true
    tool: f3_all
    query: "解体工事の費用 撤去"
    expect:
      min_hits: 3
      fee_any: ["解体撤去費", "解体費", "施設解体費"]

  - name: 難3_希少費目でもヒット（処分費）
    difficulty: 3
    provisional: true
    tool: f3_all
    query: "処分費 輸送容器"
    expect:
      min_hits: 1
      fee_any: ["処分費"]

  - name: 難3_希少炉型でヒット（PWRのみ返る）
    difficulty: 3
    provisional: true
    tool: f3_all
    query: "解体撤去費"
    reactor_type: "PWR"
    expect:
      min_hits: 1
      all_reactor: "PWR"

# ───────────────────────────────────────────────────────────────
# 軸② LLMレビュー品質
#   excel/sheet 指定で run_review を実行（または synthetic_mappings で合成）。
#   query（任意）: fee_type/reactor_type/utility をクエリ文脈として明示。
#   expect:
#     max_items / min_items     : 件数（過検出/見逃しガード）
#     must_have_f3_grounded      : F3根拠の指摘が最低1件
#     forbid_f3_grounded         : F3根拠の指摘を出してはならない（難4・非ハルシネーション）
#     forbid_law_basis           : 法令/規制を根拠にしない
#     should_flag_any / must_flag: 触れるべき観点
# ───────────────────────────────────────────────────────────────
review_cases:
  # ── 難2（合成）: 無関係な情報が検索に混ざっても正しくレビューできる ──
  # 費目=解体撤去費（ナレッジ豊富）。検索は他社・他工事・他話題のレコードも返すが、
  # 本申請に関連する根拠でレビューを生成できること（難1相当の能力も包含して実証）。
  # 記載必須欄（年度・工事件名・実施理由・費用低減策・説明・表の計画費用）は全て埋め、
  # 空欄のルール指摘が出ない＝指摘がF2/F3照合（RAG）由来になるように作る。
  # 残す「隙」は過去F3事例が求めた事項（単価積算根拠・一式内訳・低減額の根拠）のみ。
  - name: 難2_合成_無関係情報の混在下で正しくレビュー
    difficulty: 2
    provisional: true
    synthetic_mappings:
      - {field_name: "年度",        cell_address: "C4",  value: "2026"}
      - {field_name: "電力会社",     cell_address: "C5",  value: "関東電力"}
      - {field_name: "工事件名",    cell_address: "C6",  value: "館山1・2号機 タービン建屋不要配管解体撤去工事"}
      - {field_name: "炉型",        cell_address: "C7",  value: "BWR"}
      - {field_name: "計画実績区分", cell_address: "C8",  value: "計画"}
      - {field_name: "件名",        cell_address: "G5",  value: "館山1・2号機 タービン建屋不要配管解体撤去工事"}
      - {field_name: "対象費目1",    cell_address: "G6",  value: "解体撤去費"}
      - {field_name: "発電所名",     cell_address: "G8",  value: "館山発電所"}
      - {field_name: "炉型",        cell_address: "G9",  value: "BWR"}
      - {field_name: "工期開始日",   cell_address: "G10", value: "2026年10月"}
      - {field_name: "工期終了日",   cell_address: "G11", value: "2027年9月"}
      - {field_name: "対象号炉1",    cell_address: "G14", value: "館山1号機"}
      - {field_name: "対象号炉2",    cell_address: "G15", value: "館山2号機"}
      - {field_name: "実施内容",     cell_address: "G22",
         value: "非管理区域に属するタービン建屋内の不要配管・弁類の機械的解体を実施する。切断・取り出し後に搬出し、仮置きヤードへ運搬する。解体作業は放射線管理区域外で実施するため、一般産業廃棄物として処理する。"}
      - {field_name: "実施理由",     cell_address: "G23",
         value: "館山1・2号機は廃止措置計画認可を受け、第1段階（周辺建屋・付帯設備の解体）を推進中である。本工事は廃止措置計画工程に基づき、非管理区域機器を先行して解体することで、後次工程である管理区域内解体作業のための作業空間確保および廃棄物搬出ルートの整備を目的とする。"}
      - {field_name: "実施費用低減策", cell_address: "G24",
         value: "複数機器の一括解体により重機稼働率を向上させ、クレーン・搬送車両の待機ロスを削減する。解体片の分別（金属スクラップ/産業廃棄物）を現場で実施し、リサイクル率向上による処分費低減を見込む。"}
      - {field_name: "説明",        cell_address: "G25",
         value: "廃炉ワーキンググループ報告対象工事。解体物はすべて非放射性であり、産業廃棄物（金属くず・廃プラスチック）として適正処理する。放射線管理区域への影響なし。"}
      # 解体機器表（アクティブ2行・必須列=計画_費用まで記載済み）
      - {field_name: "解体機器表_30_対象年度",  cell_address: "B30", value: "2026"}
      - {field_name: "解体機器表_30_分類",     cell_address: "C30", value: "配管"}
      - {field_name: "解体機器表_30_解体機器",  cell_address: "D30", value: "タービン建屋不要配管"}
      - {field_name: "解体機器表_30_作業区域",  cell_address: "E30", value: "非管理区域"}
      - {field_name: "解体機器表_30_支払い対象可否", cell_address: "F30", value: "支払い対象"}
      - {field_name: "解体機器表_30_計画_員数", cell_address: "G30", value: "2"}
      - {field_name: "解体機器表_30_計画_解体物量", cell_address: "H30", value: "10"}
      - {field_name: "解体機器表_30_計画_工数", cell_address: "I30", value: "50"}
      - {field_name: "解体機器表_30_計画_費用", cell_address: "J30", value: "600000"}
      - {field_name: "解体機器表_31_対象年度",  cell_address: "B31", value: "2026"}
      - {field_name: "解体機器表_31_分類",     cell_address: "C31", value: "弁"}
      - {field_name: "解体機器表_31_解体機器",  cell_address: "D31", value: "手動弁類"}
      - {field_name: "解体機器表_31_作業区域",  cell_address: "E31", value: "非管理区域"}
      - {field_name: "解体機器表_31_支払い対象可否", cell_address: "F31", value: "支払い対象"}
      - {field_name: "解体機器表_31_計画_員数", cell_address: "G31", value: "2"}
      - {field_name: "解体機器表_31_計画_解体物量", cell_address: "H31", value: "5"}
      - {field_name: "解体機器表_31_計画_工数", cell_address: "I31", value: "30"}
      - {field_name: "解体機器表_31_計画_費用", cell_address: "J31", value: "250000"}
    query:
      fee_type: "解体撤去費"
      reactor_type: "BWR"
      utility_name: "関東電力"
    frame: frameB
    sheet: MRC1
    expect:
      min_items: 1
      max_items: 7
      must_have_f3_grounded: true   # ノイズ混在でも関連根拠のレビューが出せる
      forbid_law_basis: true

  # ── 難3（合成）: 類似するが無関係な情報（近縁費目）が混ざっても選別できる ──
  # 費目=処分費（希少）。検索は意味の近い「廃棄物処理費」（他社・容器検査の話題）を
  # 上位に返す（軸①難3で実測済み）。それを根拠にせず、処分費の過去事例のみで
  # レビューできること（誤った根拠は関連性ガードが降格＝evidence で確認可能）。
  # 難2と同様、記載必須欄は全て埋めて空欄指摘を排し、RAG照合の証跡に特化する。
  # 残す「隙」＝輸送容器の数量と廃棄物発生量の対応根拠（処分費F3事例が過去に要求）。
  - name: 難3_合成_近縁費目の混在下で選別してレビュー
    difficulty: 3
    provisional: true
    synthetic_mappings:
      - {field_name: "年度",        cell_address: "C4",  value: "2026"}
      - {field_name: "電力会社",     cell_address: "C5",  value: "関東電力"}
      - {field_name: "工事件名",    cell_address: "C6",  value: "館山2号機 解体撤去工事に伴う廃棄物輸送容器処分"}
      - {field_name: "炉型",        cell_address: "C7",  value: "BWR"}
      - {field_name: "計画実績区分", cell_address: "C8",  value: "計画"}
      - {field_name: "件名",        cell_address: "G5",  value: "館山2号機 解体撤去工事に伴う廃棄物輸送容器処分"}
      - {field_name: "対象費目1",    cell_address: "G6",  value: "処分費"}
      - {field_name: "発電所名",     cell_address: "G8",  value: "館山発電所"}
      - {field_name: "炉型",        cell_address: "G9",  value: "BWR"}
      - {field_name: "工期開始日",   cell_address: "G10", value: "2026年11月"}
      - {field_name: "工期終了日",   cell_address: "G11", value: "2027年3月"}
      - {field_name: "対象号炉1",    cell_address: "G14", value: "館山2号機"}
      - {field_name: "実施内容",     cell_address: "G22",
         value: "解体撤去工事で発生した非放射性廃棄物を輸送容器に収納し、処分場へ輸送・処分する。輸送容器は20基を使用する予定である。積込・輸送は専門業者に委託し、マニフェストにより処分完了を確認する。"}
      - {field_name: "実施理由",     cell_address: "G23",
         value: "解体工事の進捗に伴い発生する廃棄物を滞留なく処分し、仮置きヤードの逼迫による解体工程への影響を回避するため。"}
      - {field_name: "実施費用低減策", cell_address: "G24",
         value: "輸送便の集約により運搬回数を削減し、輸送費を低減する。分別済み金属くずは有価物として売却し、処分量自体を圧縮する。"}
      - {field_name: "説明",        cell_address: "G25",
         value: "解体物はすべて非放射性であり、産業廃棄物として適正処理する。処分先は許可を有する処分場を選定済み。"}
    query:
      fee_type: "処分費"
      reactor_type: "BWR"
      utility_name: "関東電力"
    frame: frameB
    sheet: MRC1
    expect:
      max_items: 7
      forbid_law_basis: true
      # 処分費の過去事例（数量根拠の要求等）が実在するため、根拠つき指摘が出せること。
      # 近縁費目（廃棄物処理費）を引用した場合は関連性ガードが降格するため、
      # F3根拠として残る指摘は処分費関連のみ＝選別の証跡になる。
      must_have_f3_grounded: true

  - name: 難2/3_MRC1_ノイズ混在下で正しい指摘
    difficulty: 3
    provisional: true
    excel: data/form_generation/output/転記結果_frameB_関東電力.xlsx
    frame: frameB
    sheet: MRC1
    expect:
      max_items: 7   # 暫定。F3根拠の指摘が増えたため実態に合わせ調整（NuRO確定時に再設定）
      min_items: 1
      must_have_f3_grounded: true
      forbid_law_basis: true
      should_flag_any: ["実施内容", "費用", "単価"]
    # 廃炉業務を想定したゴールド指摘（仮説）。keywordsでAI出力との対応を自動マーキング（annotation用）。
    # note: precision=AIが拾えるべき / recall=AIが見落としやすい（見逃し検証）
    gold_findings:
      - {id: G1, target: "実施内容 G22",         severity: "AIからの指摘", source: F3,      note: precision, keywords: ["対象設備", "特定", "系統", "機器名", "具体"]}
      - {id: G2, target: "実施内容 G22",         severity: "要確認",       source: AI知見,  note: recall,    keywords: ["重複", "二重", "同じ記載"]}
      - {id: G3, target: "解体機器表 費用 J30-J37", severity: "AIからの指摘", source: F3,      note: precision, keywords: ["単価", "内訳", "員数", "工数", "一式"]}
      - {id: G4, target: "費用低減策 G24",        severity: "要確認",       source: F3,      note: precision, keywords: ["費用低減", "低減策", "削減", "共用"]}
      - {id: G5, target: "実施理由 G23",          severity: "要確認",       source: F3,      note: precision, keywords: ["実施理由", "必要性", "廃炉管理", "定型"]}
      - {id: G6, target: "全体支払対象金額 G19",   severity: "AIからの指摘", source: F3,      note: recall,    keywords: ["支払対象", "対象外", "突合", "全体支払"]}
      - {id: G7, target: "放射性廃棄物・BWR",      severity: "要確認",       source: F3,      note: recall,    keywords: ["放射性廃棄物", "廃棄物", "管理区域", "汚染", "除染"]}
      - {id: G8, target: "工期",                  severity: "要確認",       source: F3,      note: recall,    keywords: ["工期", "年度配分", "年度ごと", "マイルストーン"]}

  - name: 難2/3_MRC2_費用内訳の指摘
    difficulty: 3
    provisional: true
    excel: data/form_generation/output/転記結果_frameB_関東電力.xlsx
    frame: frameB
    sheet: MRC2
    expect:
      max_items: 6   # 暫定。F3根拠の指摘が増えたため実態に合わせ調整（NuRO確定時に再設定）
      min_items: 1
      must_have_f3_grounded: true
      forbid_law_basis: true
      should_flag_any: ["費用内訳", "単価", "数量"]
    gold_findings:
      - {id: G9,  target: "人件費 単価 F39",            severity: "AIからの指摘", source: F3, note: precision, keywords: ["人件費", "単価", "工数", "積算"]}
      - {id: G10, target: "材料費 単価 F40",            severity: "AIからの指摘", source: F3, note: precision, keywords: ["材料費", "単価", "見積"]}
      - {id: G11, target: "仮設備費/安全対策費 数量 E41/E43", severity: "AIからの指摘", source: F3, note: precision, keywords: ["一式", "仮設備", "安全対策", "数量", "内訳"]}
      - {id: G12, target: "年度単位総額 C30-G30",        severity: "要確認",       source: F3, note: recall,    keywords: ["年度単位総額", "年度", "SUM", "整合", "未記入"]}

  - name: 難4_正解不在でF3を捏造しない（非ハルシネーション）
    difficulty: 4
    # 非ハルシネーションは"正解依存"でなく安全不変条件。確定的ガード(apply_relevance_guard)で
    # 保証されるため、ハードゲート（FAILでexit=1）に昇格して回帰を防ぐ。
    provisional: false
    # F3に存在しない費目（放射線管理費）の小申請。検索が当たらない状況を作る。
    synthetic_mappings:
      - {field_name: "電力会社",     cell_address: "C5",  value: "関東電力"}
      - {field_name: "計画実績区分", cell_address: "C8",  value: "計画"}
      - {field_name: "炉型",        cell_address: "C7",  value: "BWR"}
      - {field_name: "対象費目1",    cell_address: "G6",  value: "放射線管理費"}
      - {field_name: "実施内容",     cell_address: "G22", value: "放射線管理区域の管理を適切に実施する。"}
    query:
      fee_type: "放射線管理費"
      reactor_type: "BWR"
      utility_name: "関東電力"
    frame: frameB
    sheet: MRC1
    expect:
      forbid_f3_grounded: true   # F3根拠の指摘を出してはならない（無関係データで捏造しない）
      forbid_f2_grounded: true   # F2根拠も同様に禁止（ガード修正でF2も根拠採用可能になったため）
      forbid_law_basis: true
