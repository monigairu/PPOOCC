# 問い合わせナレッジ機能 想定問答（評価シード）
# Step 0（2026-07-10）で作成、レビューで B-6 を追加（2026-07-11）。
# 2026-07-17: 検証マトリクス（検索×生成の難易度・報告スライド準拠）に合わせて
# 難易度タグと A-6〜A-10 を追加（計16問）。
# F3_knowledge_関東電力.xlsx の実レコード由来。
# - A群: F3自社に答えがある質問（expected_ids = 正解レコードID。いずれかが根拠に使われれば正）
# - B群: F3に答えがない質問（棄却されて起票に流れるべき）。note 冒頭の (i)(ii)(iii) はサブカテゴリ
# フェーズ1のミニ評価・フェーズ4の評価ハーネス（eval_inquiry.py）の入力。拡充時もこの形式を維持。
#
# 難易度タグ（検証マトリクスのセルに対応。eval_inquiry.py が難易度別に集計する）:
# - search_level（軸① 検索精度・A群のみ）
#     1=質問がナレッジと同じ語彙 → 上位にヒットするか
#     2=同義語・表記揺れで語彙が一致しない → それでもヒットするか
#       （A-6/A-7 は A-1/A-3 と同じ正解レコードの言い換え版＝語彙の影響だけを分離）
#     3=ナレッジ件数が少ない話題（解体撤去費が大半の中の少数費目）→ 埋もれずヒットするか
# - gen_level（軸② 生成品質）
#     1=単一レコードで完結する質問に正しく回答
#     2=複数レコードの統合が必要な質問に正しく回答
#     3=類似レコードが同時にヒットする中から必要な情報だけを選別して回答
#     4=正しいデータがヒットしないときに誤答を生成しない（B群全体がこのセル）
#
# Step 0 実測: A-1〜A-5 が load_f3 の TOP1 ヒット。B群は 4/5 が検索0件、
# B-4（PWR蒸気発生器）のみ無関係レコードがヒット（十分性判定ゲートの検証用ハードネガティブ）。

utility: 関東電力

a_cases:  # 答えあり
  - id: A-1
    search_level: 1
    gen_level: 1
    question: 実施費用低減策は「装置を共用する」とだけ記載すれば十分ですか？どこまで具体的に書く必要がありますか？
    expected_ids: ["03_KT_1G_01_0002"]
    expected_answer_gist: 共用対象の工事と削減金額の根拠（例：隣接工事と仮設足場・揚重機を共用し約800万円削減）まで具体的に記載する。
  - id: A-2
    search_level: 1
    gen_level: 2
    question: 人件費の単価が他社の同種工事より高い場合、どのような積算根拠の提出を求められますか？
    expected_ids: ["03_KT_1G_01_0003", "03_KT_1G_02_0005", "03_KT_2G_0003"]
    expected_answer_gist: 工数（人工）と単価の積算根拠。作業員区分別の積算書・公表労務単価に基づく単価表など。
  - id: A-3
    search_level: 1
    gen_level: 1
    question: 仮設備費や安全対策費を「1式」で計上する場合、内訳としてどのような明細が必要ですか？
    expected_ids: ["03_KT_1G_01_0004"]
    expected_answer_gist: 一式計上の対象範囲・規模がわかる明細（例：仮設足場・放射線管理区域設定の範囲図と数量明細）。
  - id: A-4
    search_level: 1
    gen_level: 3  # 人件費系の類似レコード（計画時の単価根拠 0003/2G_0003 等）が同時にヒットする中で実績超過の1件を選別
    question: 実績の人件費が計画を15%超過した場合、どのような説明資料が必要ですか？
    expected_ids: ["03_KT_1G_02_0001"]
    expected_answer_gist: 超過理由と工数差異の説明（差異説明書）。例：想定外の汚染拡大による除染工程の増加。
  - id: A-5
    search_level: 1
    gen_level: 2
    question: 支払い対象と対象外の区分はどのような資料で示せばよいですか？
    expected_ids: ["03_KT_2G_0004", "03_KT_2G_0001"]
    expected_answer_gist: 対象/対象外の区分一覧と判断根拠（社内整理）、費用内訳との突合表。
  - id: A-6
    search_level: 2  # A-1（03_KT_1G_01_0002）の言い換え版。「実施費用低減策」「共用」を使わない
    gen_level: 1
    question: コストを抑える工夫として隣の工事と機材を使い回すつもりですが、削減できる金額の見込みまで書く必要がありますか？
    expected_ids: ["03_KT_1G_01_0002"]
    expected_answer_gist: 共用対象の工事と削減金額の根拠（例：隣接工事と仮設足場・揚重機を共用し約800万円削減）まで具体的に記載する。
  - id: A-7
    search_level: 2  # A-3（03_KT_1G_01_0004）の言い換え版。「1式」「仮設備費」を使わない
    gen_level: 1
    question: 足場代や安全対策の費用を、内訳を付けずにひとまとめの金額で計上しても問題ありませんか？
    expected_ids: ["03_KT_1G_01_0004"]
    expected_answer_gist: 一式計上の対象範囲・規模がわかる明細（例：仮設足場・放射線管理区域設定の範囲図と数量明細）。
  - id: A-8
    search_level: 3  # 維持管理費はF3中の少数費目（解体撤去費が大半）。点検周期の話題はこの1件のみ
    gen_level: 1
    question: 維持管理費の定期点検について、点検周期の根拠はどのように示せばよいですか？
    expected_ids: ["03_KT_1G_01_0010"]
    expected_answer_gist: 保安規定上の点検区分を根拠として明記する。
  - id: A-9
    search_level: 3  # 処分費はF3中この1件のみの少数費目
    gen_level: 1
    question: 低レベル放射性廃棄物の輸送容器の調達数量はどのような根拠で示す必要がありますか？
    expected_ids: ["03_KT_1G_01_0011"]
    expected_answer_gist: 廃棄物発生量の予測と容器数の対応（発生量予測と容器数の対応表）。
  - id: A-10
    search_level: 1
    gen_level: 3  # 解体物量系の類似レコード（計画時の算出根拠 0008・廃棄物区分対応 0014）が同時にヒットする中から実績増の1件を選別
    question: 実績の解体物量が計画より増加した場合、どのような説明を求められますか？
    expected_ids: ["03_KT_1G_02_0003"]
    expected_answer_gist: 物量増の根拠（現地調査結果等。例：現地開放後に判明した付帯配管の増加）と費用への影響。物量計算書（改訂）と差分根拠。
b_cases:  # 答えなし（棄却されるべき）＝生成難易度4。サブカテゴリ：(i)F3全体に無い話題 (ii)自社ヒットするが答えでない (iii)他社F3にはあるが自社に無い話題（REQUIREMENTS §8・自社フィルタの検証）
  - id: B-1
    question: 使用済燃料の乾式キャスク保管に関する費用は支払い対象になりますか？
    note: (i) 乾式キャスクはF3に存在しない。Step0実測=検索0件。
  - id: B-2
    question: クリアランス金属を売却した場合の売却益は費用から控除する必要がありますか？
    note: (i) クリアランス区分の語は存在するが売却益の扱いは無い。Step0実測=検索0件。
  - id: B-3
    question: 様式の提出に押印は必要ですか？電子印は認められますか？
    note: (i) 事務連絡はファイル名規則のみ存在。Step0実測=検索0件。
  - id: B-4
    question: PWRの蒸気発生器の解体工法について過去に指摘はありますか？
    note: (ii) 関東電力F3はBWRのみ。解体工法系レコードがヒットする（Step0実測=5件）ため、十分性判定で棄却すべきハードネガティブ。
  - id: B-5
    question: 解体作業員の被ばく線量の管理基準は何ミリシーベルトですか？
    note: (iii) 自社F3には無いが、他社F3（北の海電力 03_1G_02_0008 放射線管理記録・03_1G_03_0007 被ばく状況報告）には関連話題が実在する。自社フィルタが壊れると他社レコードが混入し得るケース＝フィルタ検証を兼ねる。Step0実測=検索0件（フィルタ正常）。
  - id: B-6
    question: 他の電力会社では同種の解体工事の人件費単価はいくらでしたか？
    note: (iii) 他社実績はPoCの検索対象外（REQUIREMENTS §0-3・自社フィルタ）。自社F3にも人件費単価の記録（A-2の正解群）があり検索ヒットするが、「他社の単価」という質問には答えられないため十分性判定で棄却すべき。フィルタと十分性の両ゲートを検証する追加ハードネガティブ（Step0未実測・フェーズ1で計測）。
