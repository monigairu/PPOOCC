# 問い合わせナレッジ機能 想定問答（評価シード）
# Step 0（2026-07-10）で作成。F3_knowledge_関東電力.xlsx の実レコードから起こした10問。
# - A群: F3自社に答えがある質問（expected_ids = 正解レコードID。いずれかが根拠に使われれば正）
# - B群: F3に答えがない質問（棄却されて起票に流れるべき）
# フェーズ1のミニ評価・フェーズ4の評価ハーネス（eval_inquiry.py）の入力。拡充時もこの形式を維持。
# Step 0 実測: A群 5/5 が load_f3 の TOP1 ヒット。B群は 4/5 が検索0件、
# B-4（PWR蒸気発生器）のみ無関係レコードがヒット（十分性判定ゲートの検証用ハードネガティブ）。

utility: 関東電力

a_cases:  # 答えあり
  - id: A-1
    question: 実施費用低減策は「装置を共用する」とだけ記載すれば十分ですか？どこまで具体的に書く必要がありますか？
    expected_ids: ["03_KT_1G_01_0002"]
    expected_answer_gist: 共用対象の工事と削減金額の根拠（例：隣接工事と仮設足場・揚重機を共用し約800万円削減）まで具体的に記載する。
  - id: A-2
    question: 人件費の単価が他社の同種工事より高い場合、どのような積算根拠の提出を求められますか？
    expected_ids: ["03_KT_1G_01_0003", "03_KT_1G_02_0005", "03_KT_2G_0003"]
    expected_answer_gist: 工数（人工）と単価の積算根拠。作業員区分別の積算書・公表労務単価に基づく単価表など。
  - id: A-3
    question: 仮設備費や安全対策費を「1式」で計上する場合、内訳としてどのような明細が必要ですか？
    expected_ids: ["03_KT_1G_01_0004"]
    expected_answer_gist: 一式計上の対象範囲・規模がわかる明細（例：仮設足場・放射線管理区域設定の範囲図と数量明細）。
  - id: A-4
    question: 実績の人件費が計画を15%超過した場合、どのような説明資料が必要ですか？
    expected_ids: ["03_KT_1G_02_0001"]
    expected_answer_gist: 超過理由と工数差異の説明（差異説明書）。例：想定外の汚染拡大による除染工程の増加。
  - id: A-5
    question: 支払い対象と対象外の区分はどのような資料で示せばよいですか？
    expected_ids: ["03_KT_2G_0004", "03_KT_2G_0001"]
    expected_answer_gist: 対象/対象外の区分一覧と判断根拠（社内整理）、費用内訳との突合表。

b_cases:  # 答えなし（棄却されるべき）
  - id: B-1
    question: 使用済燃料の乾式キャスク保管に関する費用は支払い対象になりますか？
    note: 乾式キャスクはF3に存在しない。Step0実測=検索0件。
  - id: B-2
    question: クリアランス金属を売却した場合の売却益は費用から控除する必要がありますか？
    note: クリアランス区分の語は存在するが売却益の扱いは無い。Step0実測=検索0件。
  - id: B-3
    question: 様式の提出に押印は必要ですか？電子印は認められますか？
    note: 事務連絡はファイル名規則のみ存在。Step0実測=検索0件。
  - id: B-4
    question: PWRの蒸気発生器の解体工法について過去に指摘はありますか？
    note: 関東電力F3はBWRのみ。解体工法系レコードがヒットする（Step0実測=5件）ため、十分性判定で棄却すべきハードネガティブ。
  - id: B-5
    question: 解体作業員の被ばく線量の管理基準は何ミリシーベルトですか？
    note: 法令・保安知識でF3に無い。Step0実測=検索0件。
