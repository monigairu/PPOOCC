# MRC1（計実_様式2_PBG_工事概要①）レビュー観点定義
# PoC暫定版 v0.1 — PoCを通じて観点を追加・精緻化していく
#
# 各観点の属性:
#   id       : 観点ID（変更しない）
#   status   : active / draft（draftはプロンプトに含めない）
#   category : 観点カテゴリ（記載品質 / 整合性 / 完全性 / 費用妥当性）
#   field    : 対象フィールド名（null = 全フィールド対象）
#   check    : Geminiに伝えるチェック内容（具体的に書く）
#   severity : "要確認" or "AIからの指摘"
#   guidance : 指摘コメントを書く際の方向性

frame: frameB
sheet: MRC1
version: "0.1-poc"

criteria:

  # ── 記載品質 ───────────────────────────────────────────────────────
  - id: RC001
    status: active
    category: 記載品質
    field: 実施費用低減策
    check: >
      「〜に努める」「適切に実施する」「効率化を図る」など、
      具体的な施策・金額・根拠を伴わない抽象表現のみで記載されている。
    severity: 要確認
    guidance: >
      費用低減の具体的な方法（例: ○○工事と装置を共用、○工程を削減）と
      その金額効果の根拠を記載するよう求める。

  - id: RC002
    status: active
    category: 記載品質
    field: 実施理由
    check: >
      実施理由が「廃炉工事の一環として実施」「法令に基づき実施」など
      定型文・抽象文のみで、廃炉管理上の具体的な必要性が説明されていない。
    severity: 要確認
    guidance: >
      なぜこの工事を今期に実施する必要があるか（安全性・工程依存関係・規制期限など）
      を具体的に説明するよう求める。

  - id: RC003
    status: active
    category: 記載品質
    field: 実施内容
    check: >
      実施内容が「解体撤去を行う」「工事を実施する」など作業の事実のみで、
      対象設備の特定（系統名・機器名）や作業方法の記載がない。
    severity: 要確認
    guidance: >
      対象設備の具体的な名称・系統、作業工程の概要を記載するよう求める。

  # ── 整合性 ─────────────────────────────────────────────────────────
  - id: RC004
    status: active
    category: 整合性
    field: 説明
    check: >
      計画と実績に差異がある（10%以上乖離している）にもかかわらず、
      「説明」フィールドが空欄・抽象的・「〇〇のため」などのプレースホルダーのままになっている。
    severity: AIからの指摘
    guidance: >
      差異発生の具体的な原因（例: 設計変更、追加作業の発生、工期変更）と
      その対応状況を記載するよう求める。

  - id: RC005
    status: active
    category: 整合性
    field: 説明
    check: >
      対象号炉が2基以上（複数号炉）の工事であるにもかかわらず、
      号炉ごとの費用按分の考え方が記載されていない。
    severity: 要確認
    guidance: >
      各号炉への費用按分の根拠（面積比・工数比・個別積算など）を
      記載するよう求める。

  # ── 完全性 ─────────────────────────────────────────────────────────
  - id: RC006
    status: active
    category: 完全性
    field: 全体支払い対象金額
    check: >
      全体支払い対象金額の内訳（員数・解体物量・工数・単価の組み合わせ）が
      解体機器リストまたは別添資料から検証できない。
    severity: 要確認
    guidance: >
      費用内訳の明細確認、または別添資料の提出を求める。

  - id: RC007
    status: active
    category: 完全性
    field: null
    check: >
      実績提出（計画実績区分＝実績）であるにもかかわらず、
      解体機器リストの実績欄（実績_員数・実績_解体物量・実績_工数・実績_費用）が
      空欄または0のままになっている。
    severity: AIからの指摘
    guidance: >
      実績値の記載を求める。未実施の場合は理由を説明するよう求める。

  # ── 費用妥当性 ─────────────────────────────────────────────────────
  - id: RC008
    status: draft  # PoC後半でナレッジが蓄積されたら activeに変更
    category: 費用妥当性
    field: 費用
    check: >
      解体機器リスト内の単価（費用 ÷ 員数 or 工数）が、
      類似工事の相場と著しく乖離している（F3ナレッジ・類似工事データと比較）。
    severity: AIからの指摘
    guidance: >
      単価の根拠（見積書・標準単価表）の確認を求める。
      ※類似工事データが蓄積された後に有効化する。

# ── 記載必須欄（空欄チェック・決定論ルール） ──────────────────────────────
# rule_check の _generate_missing_entry_items が様式定義（config）のセル解決を使い、
# 空欄なら「記入してください」と指摘する。LLMプロンプトには含めない
# （全項目をLLMに渡す方式は過検出のため不採用・RAG_VERIFICATION §1-20）。
# opt-in 宣言：ここに載せた項目だけをチェックする。対象費目2・対象号炉2〜4のような
# 構造的に任意の欄は載せない（過検出防止）。

required_fields:
  - 年度
  - 電力会社
  - 工事件名
  - 計画実績区分
  - 実施内容
  - 実施理由
  - 実施費用低減策
  - 説明

# 表の必須列：アクティブ行（転記済みの行）に対してのみチェックする。
# 共通＝計画/実績によらず必須、計画/実績＝計画実績区分に応じて選択。
required_table_columns:
  解体機器表:
    計画: [計画_費用]
    実績: [実績_費用]
