# MRC2（計実_様式2_PBG_工事概要②）レビュー観点定義
# PoC暫定版 — LLM観点（criteria）は Step4（MRC2観点＋粒度感＋単価妥当性）で追加する。
# 現時点では記載必須欄（空欄チェック・決定論ルール）の宣言のみを持つ。

frame: frameB
sheet: MRC2
version: "0.1-poc"

# ── 記載必須欄（空欄チェック・決定論ルール） ──────────────────────────────
# rule_check の _generate_missing_entry_items が様式定義（config）のセル解決を使い、
# 空欄なら「記入してください」と指摘する。LLMプロンプトには含めない
# （全項目をLLMに渡す方式は過検出のため不採用・RAG_VERIFICATION §1-20）。
# opt-in 宣言：ここに載せた項目だけをチェックする。
# 年度単位総額_N+1〜N+4年度は単年度工事では空欄が正当のため載せない（過検出防止）。

required_fields:
  - 年度単位総額_N年度

# 表の必須列：アクティブ行（転記済みの行）に対してのみチェックする。
# 費用内訳は計画/実績の列分割を持たないため「共通」で宣言する。
# 数量だけ転記され単価が空欄の行を検出する（金額G列は数式のため対象外）。
required_table_columns:
  費用内訳:
    共通: [単価]
