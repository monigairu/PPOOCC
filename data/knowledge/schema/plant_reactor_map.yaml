# 発電所 → 炉型 の導出マップ（ドメイン知識の宣言・config駆動）
#
# ver5.3 の F3 様式（正本Excel）に炉型の列は存在しない。
# 炉型は「該当発電所」から導出する：発電所ごとに炉型はほぼ一意に決まるため、
# 電力会社が編集する様式に列を足して手動維持させない（2026-07-02 設計確定）。
#
# 号機で炉型が異なる例外（実在例：敦賀1号機=BWR/2号機=PWR）は
# 「発電所名/号機」キーで上書きできる（発電所名キーより優先）。
#
#   例:
#     敦賀発電所: BWR
#     敦賀発電所/2号機: PWR
#
# 以下はPoCダミーデータの割当（ゴールデン入力の関東=BWR と整合）。
網走原子力発電所: PWR
館山発電所: BWR
